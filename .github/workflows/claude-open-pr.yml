name: Claude Open PR

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  open-pr:
    if: github.event.comment.user.login == 'claude[bot]' && contains(github.event.comment.body, 'Create PR')
    runs-on: ubuntu-latest
    steps:
      - name: Open PR from Claude branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.comment.body || '';
            const match = body.match(/\[Create PR[^\]]*\]\((https:\/\/github\.com\/\/\/compare\/main\.\.\.([^?\)]+))/);
            if (!match) {
              core.setFailed('Could not find Claude compare link in comment.');
              return;
            }
            const compareUrl = match[1];
            const head = decodeURIComponent(match[2]);
            const issueNumber = context.payload.issue.number;
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: ${context.repo.owner}:,
              state: 'open',
            });
            if (existing.data.length > 0) {
              core.info(PR already exists for : #);
              return;
            }
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head,
              base: 'main',
              title: eat:  (issue #),
              body: Closes #\n\nAuto-opened from Claude completion comment.\n\nSource: ,
            });
            core.info(Created PR #);